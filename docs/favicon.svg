<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="court" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle (Court Floor) -->
  <circle cx="256" cy="256" r="240" fill="#0f172a" stroke="url(#court)" stroke-width="15" />
  
  <!-- Handball Player Silhouette (Modern abstract) -->
  <path d="M280 180 C320 180 340 140 340 120 C340 100 320 80 290 80 C260 80 240 100 240 120" fill="#fbbf24" /> <!-- Head -->
  
  <!-- Body Jump Shot Action -->
  <path d="M200 420 L240 280 L160 200 L110 240 M240 280 L320 200 L420 160" stroke="#0ea5e9" stroke-width="25" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M240 280 L280 420" stroke="#0ea5e9" stroke-width="25" fill="none" stroke-linecap="round" />
  
  <!-- The Ball (Digital Node) -->
  <circle cx="430" cy="150" r="30" fill="#fff" />
  <path d="M430 150 L480 120" stroke="#fff" stroke-width="4" stroke-dasharray="8 4" opacity="0.6"/>
  
  <!-- Code Brackets behind -->
  <text x="130" y="320" font-family="monospace" font-size="200" fill="#ffffff" opacity="0.1" font-weight="bold">&lt;/&gt;</text>
</svg>
